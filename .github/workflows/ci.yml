name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  demo:
    name: Demo proof path
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deterministic demo
        run: ./scripts/demo.sh
